<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — EchoPulse</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 28px; font-weight: 700; }
    .logo span { color: #6366f1; }
    .logo p { color: #94a3b8; font-size: 14px; margin-top: 8px; }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 32px;
      border: 1px solid #334155;
    }
    .card h2 { font-size: 20px; font-weight: 600; margin-bottom: 24px; text-align: center; }
    .form-group { margin-bottom: 16px; }
    label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    .btn {
      width: 100%;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #334155; cursor: not-allowed; }
    .error {
      background: #450a0a;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      color: #94a3b8;
      font-size: 14px;
    }
    .footer a { color: #6366f1; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Echo<span>Pulse</span></h1>
      <p>Every churn tool watches your product. We watch the world.</p>
    </div>
    <div class="card">
      <h2>Welcome back</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@company.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <button class="btn" id="signinBtn" onclick="signIn()">Sign In</button>
      <div class="error" id="error"></div>
    </div>
    <div class="footer">
      Don't have an account? <a href="/signup.html">Create one</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://hpstvalrvntkztvjzmjs.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwc3R2YWxydm50a3p0dmp6bWpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTk5MDIsImV4cCI6MjA5MTQzNTkwMn0.560NVQ2b22waK8fwHr_BxIcJ1Ef5S6Rz4JOwofmjAug';
    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Check if already logged in
    client.auth.getSession().then(({ data }) => {
      if (data.session) {
        const accountId = localStorage.getItem('echopulse_account_id');
        window.location.href = accountId ? '/dashboard.html' : '/onboarding.html';
      }
    });

    async function signIn() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('signinBtn');
      const errorEl = document.getElementById('error');

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.style.display = 'none';

      const { data, error } = await client.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      localStorage.setItem('echopulse_user_id', data.user.id);
      const accountId = localStorage.getItem('echopulse_account_id');
      window.location.href = accountId ? '/dashboard.html' : '/onboarding.html';
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') signIn();
    });
  </script>
</body>
</html>
