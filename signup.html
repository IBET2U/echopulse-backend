<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account — EchoPulse</title>
    <!-- Clerk browser bundle (also loaded via ESM in script below for initialization) -->
    <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --primary: #6366f1;
        --text: #f8fafc;
        --muted: #94a3b8;
        --border: rgba(148, 163, 184, 0.22);
        --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: radial-gradient(
            1000px 600px at 15% 0%,
            rgba(99, 102, 241, 0.2),
            transparent 55%
          ),
          radial-gradient(
            800px 500px at 90% 10%,
            rgba(99, 102, 241, 0.12),
            transparent 50%
          ),
          var(--bg);
        color: var(--text);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .page {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px 32px;
      }

      .shell {
        width: 100%;
        max-width: 440px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 22px;
        justify-content: center;
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: radial-gradient(
            16px 16px at 32% 32%,
            rgba(255, 255, 255, 0.45),
            rgba(255, 255, 255, 0.08) 58%,
            transparent 72%
          ),
          linear-gradient(135deg, var(--primary), #8b5cf6);
        border: 1px solid rgba(255, 255, 255, 0.14);
        flex-shrink: 0;
      }

      .brand h1 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .brand h1 span {
        color: var(--muted);
        font-weight: 600;
      }

      .card {
        background: linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.06),
            rgba(255, 255, 255, 0.02)
          ),
          var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 28px 22px 26px;
      }

      @media (min-width: 480px) {
        .card {
          padding: 32px 28px 28px;
        }
      }

      .card-title {
        margin: 0 0 6px;
        font-size: 1.125rem;
        font-weight: 600;
        text-align: center;
      }

      .card-sub {
        margin: 0 0 22px;
        font-size: 0.875rem;
        color: var(--muted);
        text-align: center;
      }

      #sign-up {
        min-height: 200px;
      }

      #sign-up:empty::after {
        content: "Loading sign-up…";
        display: block;
        text-align: center;
        color: var(--muted);
        font-size: 0.875rem;
        padding: 2rem 0;
      }

      .footer {
        margin-top: 22px;
        text-align: center;
        font-size: 0.875rem;
        color: var(--muted);
      }

      .footer a {
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      .error-banner {
        display: none;
        margin-bottom: 16px;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #fecaca;
        font-size: 0.8125rem;
        text-align: center;
      }

      .error-banner.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="shell">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <h1>Echo<span>Pulse</span></h1>
        </div>

        <div class="card">
          <p class="card-title">Create your account</p>
          <p class="card-sub">Start monitoring churn risk in minutes</p>
          <div id="clerk-error" class="error-banner" role="alert"></div>
          <div id="sign-up"></div>
        </div>

        <p class="footer">
          Already have an account?
          <a href="/signin.html">Sign in</a>
        </p>
      </div>
    </div>

    <script type="module">
      /**
       * From NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY (replace if your env differs).
       */
      const PUBLISHABLE_KEY = "pk_test_ZXRoaWNhbC1jcm93LTExLmNsZXJrLmFjY291bnRzLmRldiQ";

      const errorEl = document.getElementById("clerk-error");

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add("visible");
      }

      try {
        const { Clerk } = await import(
          "https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/+esm"
        );

        const clerk = new Clerk(PUBLISHABLE_KEY);
        await clerk.load();

        if (clerk.user) {
          window.location.replace("/dashboard.html");
        } else {
          clerk.mountSignUp(document.getElementById("sign-up"), {
            appearance: {
              variables: {
                colorPrimary: "#6366f1",
                colorBackground: "#1e293b",
                colorInputBackground: "#0f172a",
                colorText: "#f8fafc",
                colorTextSecondary: "#94a3b8",
                colorNeutral: "#64748b",
                borderRadius: "12px",
              },
              elements: {
                card: "box-shadow: none;",
                rootBox: "width: 100%;",
              },
            },
            signInUrl: "/signin.html",
            routing: "hash",
          });

          let hadUser = !!clerk.user;
          clerk.addListener(({ user }) => {
            if (user && !hadUser) {
              hadUser = true;
              window.location.href = "/onboarding.html";
            }
            if (!user) hadUser = false;
          });
        }
      } catch (e) {
        console.error(e);
        showError(
          e?.message ||
            "Could not load sign-up. Check your publishable key and try again."
        );
      }
    </script>
  </body>
</html>
